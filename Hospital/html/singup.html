<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Heart - login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/singup.css">
</head>

<body>
<section class="login-section">
    <div class="login-container">
        <div class="brand-side">
            <div class="brand-content">
                <div class="logo-box">
                    <div class="logo-img-div"></div>
                    <img src="../image/logo.png" alt="" class="logo-img-div">
                    <br><br>
                    <!-- <span>SafeHeart</span> -->
                </div>
                <h1>SafeHeart</h1>
                <p>Monitoring for a Safer Life</p>
            </div>
        </div>

        <div class="form-side">
            <div class="form-content">
                <h2>create an account</h2>
                <form>
                    <div class="input-group">
                        <label>hospatail name</label>
                        <div class="input-wrapper">
                            <input type="text" id="hospitalName"  placeholder="hospatail name">
                            <i class="fas fa-plus-square"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>location</label>
                        <div class="input-wrapper">
                            <input type="text" id="location"  placeholder="location">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>governrate</label>
                        <div class="input-wrapper">
                            <input type="text" id="governorate"  placeholder="governarate">
                            <i class="fas fa-crosshairs"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>licenses</label>
                        <div class="input-wrapper">
                            <input type="text" id="license"  placeholder="licenses">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Medical specialties</label>
                        <div class="input-wrapper">
                            <input type="text" id="specialties" placeholder="Medical specialties">
                            <i class="fas fa-user-md"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>hospital manager name</label>
                        <div class="input-wrapper">
                            <input type="text" id="managerName"  placeholder="name">
                            <i class="fas fa-user-tie"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email"   placeholder="user name">
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password"  placeholder="****************">
                            <i class="fas fa-eye"></i>
                        </div>
                    </div>

                    <div class="strength-bar">
                        <div id="strengthFill"></div>
                    </div>
                    <p id="strengthText"></p>

                    <button type="button" class="btn-login" id="signupBtn">Sign Up</button>
                    
                    <div class="form-footer">
                        <p>Don't have an Account, <a href="login.html">login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<div class="toast"></div>
<script type="module" src="../JS/singup.js"></script>

</body>
</html>
